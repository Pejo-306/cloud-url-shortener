# .github/workflows/deploy.yml
name: Deploy SAM application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (must match an Environment name)"
        type: choice
        required: true
        options: [dev, staging, prod]
        default: dev
  create:

concurrency:
  group: deploy-${{ github.event.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.ok }}
    steps:
      - id: gate
        run: |
          if [ "${{ github.event.ref_type }}" = "branch" ] && [[ "${{ github.event.ref }}" == release-* ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: precheck
    if: ${{ needs.precheck.outputs.proceed == 'true' }}
    uses: ./.github/workflows/unit_tests.yml
    with:
      python-version: '3.13'
      coverage-threshold: 80
      workdir: .
    secrets: {}

  deploy:
    needs: test
    runs-on: ubuntu-24.04-arm
    environment: ${{ inputs.environment || vars.APP_ENV || 'dev' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install and setup SAM
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node (local/act only)
        if: env.ACT == 'true'
        run: |
          set -eux
          apt-get update
          apt-get install -y ca-certificates curl gnupg
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          node -v

      - name: Configure AWS credentials (OIDC)
        if: env.ACT != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
            aws-region:     ${{ vars.AWS_REGION }}

      - name: Configure AWS credentials (local)
        if: env.ACT == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id:     ${{ secrets.LOCAL_AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.LOCAL_AWS_SECRET_ACCESS_KEY }}
            aws-region:            ${{ vars.AWS_REGION }}

      - name: Rebuild for deploy
        run: sam build --use-container

      - name: Validate
        run: sam validate --lint

      - name: Deploy SAM stack
        run: |
          sam deploy \
            --no-confirm-changeset \
            --resolve-s3 \
            --force-upload \
            --stack-name "${{ vars.APP_NAME }}-${{ vars.APP_ENV }}" \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
            AppEnv=${{ vars.APP_ENV }} \
            AppName=${{ vars.APP_NAME }} \
            FrontendBucketName=${{ vars.FRONTEND_BUCKET_NAME }} \
            ${{ env.ACT != 'true' && format('--role-arn "{0}"', secrets.CLOUDFORMATION_EXEC_ROLE_ARN) || '' }}

