name: Setup AWS Credentials
description: |
  Configure AWS credentials (OIDC or local) and create a named AWS profile.
  `act` uses local credentials (access key and secret access key).
  GitHub actions use OIDC credentials from the bootstrap OIDC stack.

inputs:
  profile-name:
    description: AWS profile name (e.g. "ci", "cd", etc.)
    required: true
  dummy:
    description: >-
      Create a profile with dummy credentials (no real AWS access).
      Use for jobs like sam build that need a profile but don't call AWS APIs.
    required: false
    default: 'false'
  aws-region:
    description: AWS region
    required: true
    default: eu-central-1
  local-aws-access-key-id:
    description: AWS access key for local runs with `act`
    required: false
  local-aws-secret-access-key:
    description: AWS secret access key for local runs with `act`
    required: false
  oidc-deploy-role:
    description: GitHub OIDC deploy role from bootstrap OIDC stack
    required: false

runs:
  using: composite
  steps:
    - name: Validate credentials
      if: inputs.dummy != 'true'
      shell: bash
      run: |
        HAS_OIDC=$([ -n "${OIDC_ROLE:-}" ] && echo 1 || echo 0)
        HAS_LOCAL=$([ -n "${LOCAL_ACCESS_KEY:-}" ] && [ -n "${LOCAL_SECRET_KEY:-}" ] && echo 1 || echo 0)
        if [ "$HAS_OIDC" = 1 ] || [ "$HAS_LOCAL" = 1 ]; then
          echo "Credentials precheck passed."
        else
          echo "::error::Either oidc-deploy-role or (local-aws-access-key-id and local-aws-secret-access-key) must be provided."
          exit 1
        fi
      env:
        OIDC_ROLE: ${{ inputs.oidc-deploy-role }}
        LOCAL_ACCESS_KEY: ${{ inputs.local-aws-access-key-id }}
        LOCAL_SECRET_KEY: ${{ inputs.local-aws-secret-access-key }}

    - name: Configure AWS credentials (OIDC)
      if: inputs.dummy != 'true' && env.ACT != 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
          role-to-assume: ${{ inputs.oidc-deploy-role }}
          aws-region:     ${{ inputs.aws-region }}

    - name: Configure AWS credentials (local)
      if: inputs.dummy != 'true' && env.ACT == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
          aws-access-key-id:     ${{ inputs.local-aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.local-aws-secret-access-key }}
          aws-region:            ${{ inputs.aws-region }}

    - name: Set dummy credentials
      if: inputs.dummy == 'true'
      shell: bash
      run: |
        # Official AWS example credential values
        echo "AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE" >> "$GITHUB_ENV"
        echo "AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" >> "$GITHUB_ENV"
        echo "AWS_DEFAULT_REGION=${{ inputs.aws-region }}" >> "$GITHUB_ENV"

    - name: Create AWS CLI profile
      shell: bash
      run: |
        mkdir -p ~/.aws
        printf '[%s]\naws_access_key_id = %s\naws_secret_access_key = %s\n' \
          "$PROFILE" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" >> ~/.aws/credentials
        if [ -n "$AWS_SESSION_TOKEN" ]; then
          printf 'aws_session_token = %s\n' "$AWS_SESSION_TOKEN" >> ~/.aws/credentials
        fi
        printf '[profile %s]\nregion = %s\n' "$PROFILE" "${AWS_DEFAULT_REGION:-eu-central-1}" >> ~/.aws/config
      env:
        PROFILE: ${{ inputs.profile-name }}
