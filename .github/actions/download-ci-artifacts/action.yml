name: Download CI Build Artifacts
description: |
  Downloads build artifacts from the latest CI run.
  Fails silently if no CI run is found or artifacts are unavailable.

inputs:
  github-token:
    description: GitHub token for API calls and artifact download.
    required: true
  artifact-name:
    description: Name of the artifact to download from the CI run.
    required: false
    default: build-artifacts

outputs:
  outcome:
    description: "'success' if artifacts were downloaded, 'failure' otherwise."
    value: ${{ steps.download.outcome }}

runs:
  using: composite
  steps:
    - name: Resolve CI run ID
      id: ci-run
      uses: ./.github/actions/get-ci-run-id
      continue-on-error: true
      with:
        github-token: ${{ inputs.github-token }}

    - name: Download build artifacts
      id: download
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: ${{ inputs.artifact-name }}
        github-token: ${{ inputs.github-token }}
        run-id: ${{ steps.ci-run.outputs.run-id }}
