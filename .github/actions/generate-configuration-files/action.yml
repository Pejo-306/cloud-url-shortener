name: Generate Configuration Files
description: |
  Decrypts SOPS-encrypted config files and generates per-function YAML configs
  for the target environment.

inputs:
  sops-age-key:
    description: Age private key for SOPS decryption (store as GitHub secret).
    required: true
  environment:
    description: Target environment (dev, staging, prod).
    required: true
  function-dirs:
    description: YAML list of config directory names to generate files for.
    required: true
    default: |
      - redirect_url
      - shorten_url
  sops-version:
    description: SOPS version. Use the same version as the encrypted config files.
    required: false
    default: 3.12.1

runs:
  using: composite
  steps:
    - name: Install SOPS
      uses: nhedger/setup-sops@v2
      with:
        version: ${{ inputs.sops-version }}

    - name: Decrypt and generate config files
      shell: bash
      env:
        ENV:           ${{ inputs.environment }}
        SOPS_AGE_KEY:  ${{ inputs.sops-age-key }}
        FUNCTION_DIRS: ${{ inputs.function-dirs }}
      run: |
        set -euo pipefail
        ENC_FILE="config/values.${ENV}.enc.yaml"
        if [ ! -f "$ENC_FILE" ]; then
          echo "::error::Encrypted config file not found: $ENC_FILE"
          exit 1
        fi
        DECRYPTED=$(sops -d "$ENC_FILE")
        # Parse YAML list: extract lines matching "  - <name>" and strip the "- "
        for func in $(echo "$FUNCTION_DIRS" | grep -E '^[[:space:]]*-[[:space:]]+' | sed -E 's/^[[:space:]]*-[[:space:]]+//'); do
          mkdir -p "config/${func}"
          echo "$DECRYPTED" > "config/${func}/${ENV}.yaml"
          echo "Generated config/${func}/${ENV}.yaml"
        done
