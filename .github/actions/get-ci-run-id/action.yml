name: Get latest CI run ID
description: |
  Resolves the CI workflow run ID for the current ref. When triggered by workflow_run,
  returns the triggering run's ID. Otherwise, fetches the latest successful CI run via API.
  Used in our CD pipeline to resolve the CI pipeline which triggered it.

inputs:
  github-token:
    description: |
      GitHub token for API calls (listWorkflowRuns). Pass secrets.GITHUB_TOKEN.
    required: true

outputs:
  run-id:
    description: The CI workflow run ID, or empty string if none found.
    value: ${{ steps.resolve.outputs.result }}

runs:
  using: composite
  steps:
    - name: Resolve CI run ID
      id: resolve
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        result-encoding: string
        script: |
          if (context.eventName === 'workflow_run') {
            return context.payload.workflow_run.id;
          }
          const runs = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'ci.yml',
            branch: context.ref.replace('refs/heads/', ''),
            status: 'success',
            per_page: 1,
          });
          return runs.data.workflow_runs[0]?.id || '';
